name: Pytest

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lightweight test deps
        run: |
          pip install flask flask-cors flask-limiter python-dotenv pytest pytest-asyncio

      - name: Run tests
        run: pytest test_voice_training.py test_flask_server.py test_voice_visualizer_integration.py -v
