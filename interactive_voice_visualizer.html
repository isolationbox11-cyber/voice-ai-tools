<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voice</title>
<style>
:root {
  --bg: #0b1a15;
  --panel: rgba(18,26,30,0.85);
  --accent: #4CC9F0;
  --warn: #F72585;
  --ok: #06D6A0;
  --warm: #FF9B4D;
  --deep-teal: #0f3d3e;
  --text: #e0e0e0;
  --glow: 0 0 40px rgba(76,201,240,0.3);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: radial-gradient(ellipse at 20% 30%, #1a4747 0%, transparent 50%),
              radial-gradient(ellipse at 80% 70%, #2a1a47 0%, transparent 50%),
              radial-gradient(ellipse at 50% 50%, #0b1a15 0%, #051010 100%);
  color: var(--text);
  font-family: "Segoe UI", system-ui, sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow: hidden;
  position: relative;
}

.blob {
  position: absolute;
  border-radius: 50%;
  filter: blur(40px);
  opacity: 0.15;
  animation: float 20s ease-in-out infinite;
}
.blob.one { width: 300px; height: 300px; background: #4CC9F0; top: 10%; left: 10%; animation-delay: 0s; }
.blob.two { width: 200px; height: 200px; background: #F72585; top: 60%; right: 15%; animation-delay: -5s; }
.blob.three { width: 180px; height: 180px; background: #FF9B4D; bottom: 20%; left: 25%; animation-delay: -10s; }

@keyframes float {
  0%, 100% { transform: translate(0, 0) scale(1); }
  25% { transform: translate(30px, -40px) scale(1.05); }
  50% { transform: translate(-20px, 20px) scale(0.95); }
  75% { transform: translate(10px, -10px) scale(1.02); }
}

.eye {
  position: absolute;
  background: #e0e0e0;
  border-radius: 50%;
  animation: blink 4s ease-in-out infinite;
}
.eye::after {
  content: "";
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 40%; height: 40%;
  background: #0b1a15;
  border-radius: 50%;
}
.eye.one { width: 24px; height: 24px; top: 20%; left: 70%; animation-delay: 0s; }
.eye.two { width: 18px; height: 18px; top: 55%; left: 80%; animation-delay: -2s; }
.eye.three { width: 14px; height: 14px; top: 80%; left: 20%; animation-delay: -1s; }
.eye.four { width: 20px; height: 20px; bottom: 15%; right: 30%; animation-delay: -3s; }

@keyframes blink {
  0%, 90%, 100% { transform: scaleY(1); }
  95% { transform: scaleY(0.1); }
}

header {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  padding: 30px 20px 0;
  z-index: 10;
}

h1 {
  font-size: 2rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--accent);
  text-shadow: var(--glow);
  opacity: 0.9;
}

#conn-badge {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 16px;
  border: 1px solid rgba(76,201,240,0.3);
  border-radius: 999px;
  background: rgba(11,26,21,0.7);
  font-size: 0.75rem;
  letter-spacing: 0.05em;
}

#conn-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #F72585;
  box-shadow: 0 0 8px rgba(247,37,133,0.8);
  transition: all 0.3s ease;
}
#conn-dot.connected {
  background: var(--ok);
  box-shadow: 0 0 12px rgba(6,214,160,0.8);
}

#visualizer-canvas {
  flex: 1;
  width: 100%;
  max-width: 600px;
  min-height: 300px;
  margin: 20px 0;
}

#status-bar {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  padding: 0 20px 20px;
  z-index: 10;
  width: 100%;
  max-width: 600px;
}

#status-msg {
  font-size: 1rem;
  letter-spacing: 0.08em;
  text-align: center;
  transition: color 0.3s ease, text-shadow 0.3s ease;
}
#status-msg.scam { color: var(--warn); text-shadow: 0 0 20px var(--warn); }
#status-msg.ok { color: var(--ok); text-shadow: 0 0 20px var(--ok); }
#status-msg.demo { color: #7209B7; text-shadow: 0 0 20px #7209B7; }

#voice-bar-container {
  width: 100%;
  height: 8px;
  border-radius: 4px;
  background: rgba(255,255,255,0.05);
  overflow: hidden;
}
#voice-bar {
  height: 100%;
  width: 0%;
  border-radius: 4px;
  background: linear-gradient(90deg, var(--accent), var(--ok));
  transition: width 0.1s ease-out;
  box-shadow: 0 0 20px var(--accent);
}

#controls {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 12px;
  padding: 0 20px 30px;
  z-index: 10;
}

button {
  padding: 12px 24px;
  border: 1px solid rgba(76,201,240,0.3);
  border-radius: 8px;
  background: rgba(11,26,21,0.8);
  color: var(--accent);
  font-family: inherit;
  font-size: 0.8rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s ease;
}
button:hover {
  background: rgba(76,201,240,0.15);
  box-shadow: var(--glow);
  border-color: var(--accent);
}
button:active { transform: scale(0.97); }
button#btn-scam:hover { border-color: var(--warn); background: rgba(247,37,133,0.15); }
button#btn-legit:hover { border-color: var(--ok); background: rgba(6,214,160,0.15); }

/* Glitch effect */
#visualizer-canvas.glitch {
  animation: glitch-anim 0.3s ease-in-out;
}
@keyframes glitch-anim {
  0%, 100% { transform: translate(0); filter: hue-rotate(0deg); }
  20% { transform: translate(-5px, 2px); filter: hue-rotate(20deg); }
  40% { transform: translate(5px, -2px); filter: hue-rotate(-20deg); }
  60% { transform: translate(-3px, 1px); filter: hue-rotate(10deg); }
  80% { transform: translate(3px, -1px); filter: hue-rotate(-10deg); }
}

.audio-visible { display: block; }
</style>
</head>
<body>

<div class="blob one"></div>
<div class="blob two"></div>
<div class="blob three"></div>
<div class="eye one"></div>
<div class="eye two"></div>
<div class="eye three"></div>
<div class="eye four"></div>

<header>
  <h1>Voice</h1>
  <div id="conn-badge">
    <div id="conn-dot"></div>
    <span id="conn-label">Disconnected</span>
  </div>
</header>

<canvas id="visualizer-canvas"></canvas>

<div id="status-bar">
  <div id="status-msg">Initializing...</div>
  <div id="voice-bar-container">
    <div id="voice-bar"></div>
  </div>
</div>

<div id="controls">
  <button id="btn-start">Start</button>
  <button id="btn-stop">Stop</button>
  <button id="btn-scam">Scam</button>
  <button id="btn-legit">Legitimate</button>
</div>

<audio id="audio-player" class="audio-visible" style="width: 100%; max-width: 600px; margin: 0 0 20px;"></audio>

<script>
const WS_URL = "ws://localhost:8765";
const canvas = document.getElementById("visualizer-canvas");
const ctx = canvas.getContext("2d");
let ws = null;
let voiceLevel = 0;
let animId = null;

function resizeCanvas() {
  canvas.width = canvas.offsetWidth;
  canvas.height = Math.max(300, canvas.offsetHeight);
}
window.addEventListener("resize", resizeCanvas);
resizeCanvas();

function drawFrame() {
  const w = canvas.width, h = canvas.height;
  const cx = w / 2, cy = h / 2;
  ctx.clearRect(0, 0, w, h);

  // Outer ring (subtle)
  ctx.beginPath();
  ctx.arc(cx, cy, 140, 0, Math.PI * 2);
  ctx.strokeStyle = "rgba(76,201,240,0.08)";
  ctx.lineWidth = 2;
  ctx.stroke();

  // Middle ring (subtle)
  ctx.beginPath();
  ctx.arc(cx, cy, 100, 0, Math.PI * 2);
  ctx.strokeStyle = "rgba(76,201,240,0.12)";
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Centre circle (voice-reactive)
  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 80);
  grad.addColorStop(0, `rgba(76,201,240,${0.1 + voiceLevel * 0.003})`);
  grad.addColorStop(1, "rgba(76,201,240,0)");
  ctx.beginPath();
  ctx.arc(cx, cy, 80, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();

  // Centre dot
  ctx.beginPath();
  ctx.arc(cx, cy, 6 + voiceLevel * 0.1, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(76,201,240,${0.3 + voiceLevel * 0.002})`;
  ctx.shadowColor = "rgba(76,201,240,0.6)";
  ctx.shadowBlur = 20 + voiceLevel * 0.5;
  ctx.fill();
  ctx.shadowBlur = 0;

  animId = requestAnimationFrame(drawFrame);
}

/* Button handlers */
function connect() {
  ws = new WebSocket(WS_URL);
  ws.addEventListener("open", () => {
    document.getElementById("conn-dot").classList.add("connected");
    document.getElementById("conn-label").textContent = "Connected";
  });
  ws.addEventListener("close", () => {
    document.getElementById("conn-dot").classList.remove("connected");
    document.getElementById("conn-label").textContent = "Disconnected";
    setTimeout(connect, 2000);
  });
  ws.addEventListener("message", (e) => {
    let data;
    try { data = JSON.parse(e.data); } catch { return; }

    switch (data.type) {
      case "voice_level_update":
        voiceLevel = data.level;
        document.getElementById("voice-bar").style.width = voiceLevel + "%";
        if (voiceLevel > 70) {
          canvas.classList.add("glitch");
          setTimeout(() => canvas.classList.remove("glitch"), 300);
        }
        break;
      case "status_update":
        document.getElementById("status-msg").textContent = data.message;
        document.getElementById("status-msg").style.color = data.color;
        break;
      case "speak_response":
        if (data.audio_base64) {
          const dataUrl = `data:${data.mime_type};base64,${data.audio_base64}`;
          const player = document.getElementById("audio-player");
          player.src = dataUrl;
          player.play();
        }
        break;
      case "trigger_alert":
        if (data.alert_type === "scam") {
          document.getElementById("status-msg").classList.add("scam");
          setTimeout(() => document.getElementById("status-msg").classList.remove("scam"), 3000);
        } else if (data.alert_type === "legitimate") {
          document.getElementById("status-msg").classList.add("ok");
          setTimeout(() => document.getElementById("status-msg").classList.remove("ok"), 3000);
        }
        break;
      case "trigger_glitch":
        canvas.classList.add("glitch");
        setTimeout(() => canvas.classList.remove("glitch"), 400);
        break;
    }
  });
}

function send(obj) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(obj));
  }
}

document.getElementById("btn-start").addEventListener("click", () => send({ type: "start_listening" }));
document.getElementById("btn-stop").addEventListener("click", () => send({ type: "stop_listening" }));
document.getElementById("btn-scam").addEventListener("click", () => send({ type: "test_scam" }));
document.getElementById("btn-legit").addEventListener("click", () => send({ type: "test_legitimate" }));

connect();
drawFrame();
</script>

</body>
</html>
