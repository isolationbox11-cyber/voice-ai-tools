<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voice</title>
<style>
:root {
  --bg: #0b1a15;
  --accent: #4CC9F0;
  --warn: #F72585;
  --ok: #06D6A0;
  --text: #e0e0e0;
  --panel: rgba(15,61,62,0.6);
  --glow: 0 0 20px rgba(76,201,240,0.3);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: radial-gradient(ellipse at 50% 30%, rgba(15,61,62,0.5) 0%, transparent 70%), #0b1a15;
  color: var(--text);
  font-family: system-ui, sans-serif;
  width: 360px;
  padding: 20px 16px;
}
h1 {
  font-size: 1.1rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 16px;
  text-shadow: var(--glow);
  text-align: center;
}
label {
  display: block;
  font-size: 0.7rem;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: rgba(224,224,224,0.6);
  margin-bottom: 4px;
}
textarea, select, input {
  width: 100%;
  padding: 10px 12px;
  border-radius: 6px;
  border: 1px solid rgba(76,201,240,0.25);
  background: rgba(11,26,21,0.7);
  color: var(--text);
  font-size: 0.85rem;
  font-family: inherit;
  margin-bottom: 12px;
}
textarea:focus, select:focus, input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: var(--glow);
}
textarea { resize: vertical; min-height: 70px; }
select { cursor: pointer; }
button {
  width: 100%;
  padding: 10px;
  border: 1px solid rgba(76,201,240,0.3);
  border-radius: 6px;
  background: rgba(11,26,21,0.8);
  color: var(--accent);
  font-family: inherit;
  font-size: 0.75rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.15s ease;
  margin-bottom: 8px;
}
button:hover {
  background: rgba(76,201,240,0.15);
  box-shadow: var(--glow);
}
button:active { transform: scale(0.98); }
#btn-scam { background: rgba(247,37,133,0.12); border-color: rgba(247,37,133,0.4); color: #F72585; }
#btn-scam:hover { background: rgba(247,37,133,0.2); }
#btn-legit { background: rgba(6,214,160,0.12); border-color: rgba(6,214,160,0.4); color: #06D6A0; }
#btn-legit:hover { background: rgba(6,214,160,0.2); }
.settings-toggle {
  text-align: center;
  margin-top: 12px;
}
.settings-toggle button {
  background: transparent;
  border-color: rgba(224,224,224,0.15);
  color: rgba(224,224,224,0.7);
  font-size: 0.7rem;
  padding: 6px;
  margin- right: 0;
}
#settings-panel {
  display: none;
  margin-top: 12px;
  padding: 12px;
  border-radius: 6px;
  background: var(--panel);
  border: 1px solid rgba(224,224,224,0.08);
}
#settings-panel.open { display: block; }
#status {
  text-align: center;
  font-size: 0.75rem;
  color: rgba(224,224,224,0.7);
  margin-top: 8px;
  min-height: 1em;
}
</style>
</head>
<body>

<h1>Voice</h1>

<label>Text</label>
<textarea id="text-input" placeholder="Type text to speak..."></textarea>

<label>Call Type</label>
<select id="call-type">
  <option value="LEGITIMATE">Legitimate</option>
  <option value="SCAM_DETECTED">Scam Detected</option>
  <option value="VERIFICATION">Verification</option>
</select>

<button id="btn-speak">Speak</button>
<button id="btn-scam">Scam Detected</button>
<button id="btn-legit">Legitimate</button>

<div id="status"></div>

<div class="settings-toggle">
  <button id="btn-settings">Settings</button>
</div>

<div id="settings-panel">
  <label>Server URL</label>
  <input id="setting-url" type="text" value="http://127.0.0.1:5000">
  <label>Token</label>
  <input id="setting-token" type="text" placeholder="Voice server token">
  <button id="btn-save-settings" style="margin-top: 8px;">
    Save Settings
  </button>
</div>

<script src="popup.js"></script>
</body>
</html>
